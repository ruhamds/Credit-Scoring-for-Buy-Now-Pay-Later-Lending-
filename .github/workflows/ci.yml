name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Fail on errors — warn on style
          flake8 src/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.venv

      - name: Run tests
        run: |
          pytest tests/test_data_processing.py tests/test_rfm.py tests/test_api.py \
            -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test   # only build if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy artifacts for build
        run: |
          mkdir -p artifacts
          touch artifacts/model.joblib
          touch artifacts/model_threshold.joblib
          echo "Amount_count" > artifacts/selected_features.csv

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false        # build only — no registry push needed
          tags: credit-risk-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max