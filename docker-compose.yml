 services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     creditrisk
      POSTGRES_PASSWORD: creditrisk
      POSTGRES_DB:       creditrisk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditrisk"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://creditrisk:creditrisk@db:5432/creditrisk
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts:ro   # read-only — model files
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  mlflow_data: